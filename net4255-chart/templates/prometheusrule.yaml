{{- if and .Values.prometheus.enabled .Values.prometheus.alertRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "net4255.fullname" . }}-alerts
  labels:
    {{- include "net4255.labels" . | nindent 4 }}
    {{- with .Values.prometheus.alertRules.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # ──────────────────────────────────────────────
    # Group 1: Pod Health
    # ──────────────────────────────────────────────
    - name: net4255.pod.health
      rules:
        - alert: PodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is restarting frequently"
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }}
              has restarted more than 3 times in the last 15 minutes.

        - alert: PodCrashLooping
          expr: |
            kube_pod_container_status_waiting_reason{namespace="{{ .Release.Namespace }}", reason="CrashLoopBackOff"} > 0
          for: 5m
          labels:
            severity: critical
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is CrashLooping"
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }}
              is in CrashLoopBackOff state for more than 5 minutes.

    # ──────────────────────────────────────────────
    # Group 2: Resource Usage
    # ──────────────────────────────────────────────
    - name: net4255.resources
      rules:
        - alert: HighCPUUsage
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}", container!=""}[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="cpu"}) by (pod)
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has high CPU usage"
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} CPU usage is above 85% of its limit
              for more than 10 minutes.

        - alert: HighMemoryUsage
          expr: |
            (
              sum(container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container!=""}) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="memory"}) by (pod)
            ) > 0.90
          for: 10m
          labels:
            severity: warning
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has high memory usage"
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} memory usage is above 90% of its limit
              for more than 10 minutes.

    # ──────────────────────────────────────────────
    # Group 3: Deployment Health
    # ──────────────────────────────────────────────
    - name: net4255.deployment
      rules:
        - alert: ReplicaMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}"}
            !=
            kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}"}
          for: 10m
          labels:
            severity: critical
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "Deployment {{ "{{" }} $labels.deployment {{ "}}" }} has replica mismatch"
            description: >-
              Deployment {{ "{{" }} $labels.deployment {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }}
              has had a mismatch between desired and available replicas for 10 minutes.

        - alert: WebdbEndpointDown
          expr: |
            up{job=~".*webdb.*"} == 0
          for: 3m
          labels:
            severity: critical
            app: {{ include "net4255.fullname" . }}
          annotations:
            summary: "webdb scrape target is down"
            description: >-
              Prometheus cannot scrape the webdb /metrics endpoint for more than 3 minutes.
              The application may be unresponsive.
{{- end }}
