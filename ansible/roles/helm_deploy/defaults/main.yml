---
helm_release_name: "net4255"
helm_chart_path: "{{ playbook_dir }}/../../net4255-chart"
helm_values_file: ""
helm_timeout: "300s"
helm_atomic: true
helm_wait: true
app_image_repository: "azerzaa/flask-net4255"
app_image_tag_webdb: "webdb-v7"
app_image_tag_webnodb: "webnodb-v2"
mongodb_replicas: 3
mongodb_storage_class: "longhorn-static"
mongodb_storage_size: "0.1Gi"
ingress_host_webdb: "webdb.azaabar.net4255.luxbulb.org"
ingress_host_webnodb: "webnodb.azaabar.net4255.luxbulb.org"
prometheus_enabled: true
